name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm audit
      - run: npm run lint
      - run: npm run build

  backend:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "backend[dev]" -c backend/constraints.txt
      - run: python backend/relayctl.py privacy-audit --tracked-only .
      - working-directory: backend
        run: python -m pytest --tb=short -q
