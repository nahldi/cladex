name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm audit
      - run: npm run lint
      - run: npm run frontend:smoke
      - run: npm run build
      - run: npm run api:smoke

  backend:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "backend[dev]" -c backend/constraints.txt
      - run: python backend/relayctl.py privacy-audit --tracked-only .
      - working-directory: backend
        run: python -m pytest --tb=short -q

  doctor:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - run: npm ci
      - run: cmd /c npm install -g @openai/codex@0.125.0 @anthropic-ai/claude-code@2.1.117
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "backend[dev]" -c backend/constraints.txt
      - run: npm run api:smoke
        env:
          CLADEX_API_SMOKE_BACKEND_SUCCESS: '1'
      - run: npm run api:smoke
        env:
          CLADEX_API_SMOKE_BOOTSTRAP: '1'
      - run: python backend/cladex.py doctor --json

  package:
    runs-on: windows-latest
    needs: [frontend, backend, doctor]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run electron:build
      - uses: actions/upload-artifact@v6
        with:
          name: cladex-windows-exes
          path: |
            release/*.exe
            release/latest.yml
          if-no-files-found: error
